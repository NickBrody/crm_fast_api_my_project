
services:
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://app:app@db:5432/crm
    networks:
      - crmnet
    volumes:
      - ./alembic/versions:/app/alembic/versions

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: crm
    # ports: не указываем для production
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - crmnet

volumes:
  pgdata:

networks:
  crmnet:
    driver: bridge